<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<script src="/script.js" defer></script>
<style>
#confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
   pointer-events: none; overflow: hidden; z-index: 999; }
#confetti span { position: absolute; top: -10px; width: 8px; height: 8px; 
   animation: fallConfetti linear forwards; }
@keyframes fallConfetti { to { transform: translateY(110vh) rotate(360deg); } }
</style>
<style>
  body { background: #16161d; color: #fff8e7; font-family: sans-serif; user-select: none; margin:0; }
  canvas { display: block; border: 1px solid #6b6a68; }
  .everything { margin-top: 5%; display: flex; flex-direction: column; align-items: center; justify-content: center; }

  #score, #text { font-size: 1rem; letter-spacing: 0.05rem; color: #6b6a68; margin: 5px; }
  #score span { color: #fff8e7; }

  .backbutton { position: absolute; top: 20px; left: 20px; padding: 2px 8px; text-decoration: none; font-size: 1.5rem;
    background: #16161d; color: #fff8e7; border-radius: 4px; border: solid 1px #fff8e7; }
  .backbutton:hover { cursor: pointer; background: #fff8e7; color: #16161d; transition: 0.3s; }

   #stars { position: fixed; top: 0; left: 0; width: 100%; height: 200%; z-index: -1; overflow: hidden;
      animation: scrollStars 60s linear infinite; }
   #stars span { position: absolute; width: 2px; height: 2px; background: #fff8e7; border-radius: 50%; }
   @keyframes scrollStars {
      from { transform: translateY(-50%); }
      to   { transform: translateY(0); }
   }
</style>
</head>
<body>
  <a class="backbutton" href="/index.html">&lt;</a>
  <div id="stars"></div>

  <div class="everything">
    <div id="score">score <span id="score-val">0</span></div>
    <canvas id="canvas"></canvas>
    <div id="text">arrow keys to move</div>
  </div>

<script>
const starsEl = document.getElementById('stars');
for (let i = 0; i < 300; i++) {
  const s = document.createElement('span');
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%'; // spread across the doubled height
  starsEl.appendChild(s);
}
</script>

<script>
// Game setup
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score-val');
const textEl = document.getElementById('text');

const COLS = 25, ROWS = 25;
const CELL = Math.floor(Math.min(window.innerWidth * 0.9, 500) / COLS);
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

const isTouch = 'ontouchstart' in window;
let snake, dir, next, food, score, running, interval;

function init() {
  snake = [{x:13,y:12}, {x:12,y:12}, {x:11,y:12}];
  dir = {x:1, y:0};
  next = {x:1, y:0};
  score = 0;
  running = true;

  scoreEl.textContent = 0;
  textEl.textContent = isTouch ? 'swipe to move' : 'arrow keys to move';

  placeFood();
  clearInterval(interval);
  interval = setInterval(step, 120);
  draw();
}

function gameOver() {
  running = false;
  clearInterval(interval);
  textEl.textContent = isTouch ? 'game over - tap to play again' : 'game over - press space to play again';
}

function placeFood() {
  do {
    food = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function step() {
  dir = next;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  const hitWall = head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS;
  const hitSelf = snake.some(s => s.x === head.x && s.y === head.y);
  if (hitWall || hitSelf) return gameOver();

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    scoreEl.textContent = ++score;
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#16161d';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#5c6099';
  ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);

  snake.forEach((seg, i) => {
    ctx.fillStyle = i === 0 ? '#fff8e7' : '#6b6a68';
    ctx.fillRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2);
  });
}

// Keyboard controls
const keyMap = { ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0} };

document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (!running) init();
    return;
  }
  const d = keyMap[e.key];
  if (!d) return;
  e.preventDefault();
  if (d.x !== -dir.x || d.y !== -dir.y) next = d;
});

// Touch controls
let touchStartX = 0, touchStartY = 0;

canvas.addEventListener('touchstart', e => {
  if (!running) { init(); return; }
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  if (!running) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 25 && Math.abs(dy) < 25) return;

  const d = Math.abs(dx) > Math.abs(dy)
    ? { x: dx > 0 ? 1 : -1, y: 0 }
    : { x: 0, y: dy > 0 ? 1 : -1 };

  if (d.x !== -dir.x || d.y !== -dir.y) next = d;
}, { passive: true });

init();
</script>
</body>
</html>
