<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Silly Name Generator</title>
<script src="/script.js" defer></script>
<style>
#confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
   pointer-events: none; overflow: hidden; z-index: 999; }
#confetti span { position: absolute; top: -10px; width: 8px; height: 8px; 
   animation: fallConfetti linear forwards; }
@keyframes fallConfetti { to { transform: translateY(110vh) rotate(360deg); } }
</style>
<style>
    body { background: #16161d; user-select: none; color:#fff8e7; font-family: sans-serif; user-select: none; letter-spacing:0.05rem; font-size:1rem;}
    button {background: #16161d; color: #fff8e7; border: 2px solid #fff8e7; padding: 0.5em 1em; 
        border-radius: 4px; cursor: pointer; margin:1rem;}
    button:hover {background: #fff8e7; color: #16161d; transition: 0.3s;}  
    h3 {font-size:1.5rem;}
    
    li {text-decoration: none; display: flex; justify-content: center; align-items: center; flex-direction: column;
        margin:1rem;}
    ul {margin-top:8%;}
    select {background:#16161d; color:#fff8e7; padding: 6px 10px; border-radius: 4px; margin:1rem;}
    #output{font-size:1.25rem; margin:auto;}

    .backbutton { position:absolute; top: 20px; left: 20px; padding:2px 8px; text-decoration:none; font-size:1.5rem;
        background: #16161d; color:#fff8e7; border-radius: 4px; border-color: #fff8e7; border:solid; border-width:1px; }
    .backbutton:hover {cursor:pointer; background: #fff8e7; color:#16161d; transition:0.3s} 
    

    #stars { position: fixed; top: 0; left: 0; width: 100%; height: 200%; z-index: -1; overflow: hidden;
    animation: scrollStars 60s linear infinite; }
    #stars span { position: absolute; width: 2px; height: 2px; background: #fff8e7; border-radius: 50%; }
    
    @keyframes scrollStars {
    from { transform: translateY(-50%); }
    to   { transform: translateY(0); }
    }
    /* make larger on mobile */
    @media (max-width: 768px) {
        body {margin-top: 3rem; padding: 0 1rem;}
        .backbutton {font-size: 3rem; padding: 4px 12px;}
    }

</style>
</head>
<body>
<div id="stars"></div>
<a class="backbutton" href="/index.html">&lt;</a>

<ul>
    <li><h3>Press the Button Below to Generate Silly Names :)</h3></li>
    <li>
        <label for="count">How many names?</label>
    </li>
    <li>
        <select id="count">
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option selected>4</option>
            <option>5</option>
            <option>6</option>
        </select>
        <button id="generateButton">click me</button>
    </li>
    <li><ul id="output"></ul></li>
</ul>

<script>
const starsEl = document.getElementById('stars');
for (let i = 0; i < 300; i++) {
  const s = document.createElement('span');
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%'; // spread across the doubled height
  starsEl.appendChild(s);
}
</script>
<script>
    const start_letters = ["a","e","i","o","u","y"];
    const end_letters = ["b","c","d","f","g","h","j","k","l","m","n","p","q","r","s","t","v","w","x","y","z"];
    const middle_syllables = [
    "ba","re","lo","mi","ta","no","zu","ki","va","ro",
    "de","fu","ga","he","ji","ka","le","mo","na","pi",
    "qu","ru","se","ti","vu","wa","xe","ya","zo","bi",
    "ca","du","fe","gi","ho","ju","ke","lu","ni","po",
    "ra","so","tu","vi","we","za","be","co","di","fa"
    ];
    function randInt(max) {    return Math.floor(Math.random() * (max + 1));    }

    function generateName() {
        let start = "";
        let middle = "";
        let end = "";

        if (Math.random() < 0.5) { start = start_letters[randInt(start_letters.length - 1)]; }
        if (Math.random() < 0.5) { end = end_letters[randInt(end_letters.length - 1)]; }

        const syllableCount = randInt(2) + 1; // 1 to 3 syllables
        for (let i = 0; i < syllableCount; i++) {
            middle += middle_syllables[randInt(middle_syllables.length - 1)];
        }
        return start + middle + end;
    }

    document.getElementById("generateButton").addEventListener("click", function() {
    const count = parseInt(document.getElementById("count").value, 10);
    const output = document.getElementById("output");
    output.innerHTML = "";
    // output.style.whiteSpace = "nowrap";

    for (let i = 0; i < count; i++) {
        const span = document.createElement("span");
        span.textContent = generateName();
        span.style.marginRight = "40px"; 
        output.appendChild(span);
    }
});
</script>

</body>
</html>
