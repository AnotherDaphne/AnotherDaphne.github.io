<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lines</title>
    <style>
        body {height: 100%; overflow: hidden; background: #16161d; color:#fff8e7 }
        p {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);}

        .backbutton { position:absolute; top: 20px; left: 20px; padding:0px 8px; text-decoration:none; font-size:1.75rem;
            background: #16161d; color:#fff8e7; border-radius: 4px; border-color: #fff8e7; }
        .backbutton:hover {cursor:pointer; background: #fff8e7; color:#16161d; transition:0.3s}

    </style>
</head>
<body>
    <p>click anywhere</p> 
    <canvas id="crackCanvas"></canvas>

    <a class="backbutton" href="/index.html">&lt;</a>

    <script>
        document.addEventListener("click", (e) => { // hide the text when clicked
            const p = document.querySelector('p');
            if (p) {
                p.style.display = 'none';
            }
        });
        const canvas = document.getElementById('crackCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        canvas.addEventListener('click', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            createCrack(x, y);
        });

        function createCrack(x, y) {
            const maxX = Math.max(x, canvas.width - x);
            const maxY = Math.max(y, canvas.height - y);
            const crackLength = Math.sqrt(maxX * maxX + maxY * maxY);
            
            const angle = Math.random() * 2 * Math.PI;

            const endX = x + crackLength * Math.cos(angle);
            const endY = y + crackLength * Math.sin(angle);

            ctx.strokeStyle = '#FFF8E7';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();
            

            for (let i = 0; i < 8; i++) { //randomly generate 8 from the center point
                const subAngle = angle + (Math.random() - 0.5) * Math.PI *2; 
                const subLength = crackLength * (Math.random() + 0.5); 
                const subEndX = x + subLength * Math.cos(subAngle);
                const subEndY = y + subLength * Math.sin(subAngle);

                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(subEndX, subEndY);
                ctx.stroke();
            }
        }

    </script>
</body>
</html>
