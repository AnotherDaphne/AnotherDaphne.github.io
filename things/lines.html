<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lines</title>

<style>
   body{background:#16161d; height: 100%; overflow: hidden; color:#fff8e7; user-select: none;}
   p {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);}

   ul {list-style:none; position:fixed; top:5px; left:30px; display:flex; gap:1rem;}
   li {display:inline; background: #16161d; color:#fff8e7; border:solid; border-width:1px; border-radius: 4px; border-color: #fff8e7;
         padding:4px 12px;}
   li:hover {cursor:pointer; background: #fff8e7; color:#16161d; transition:0.3s}

   #stars { position: fixed; top: 0; left: 0; width: 100%; height: 200%; z-index: -1; overflow: hidden;
      animation: scrollStars 60s linear infinite; }
   #stars span { position: absolute; width: 2px; height: 2px; background: #fff8e7; border-radius: 50%; }
   @keyframes scrollStars {
      from { transform: translateY(-50%); }
      to   { transform: translateY(0); }
   }

   .backbutton { position:absolute; top: 20px; left: 20px; padding:2px 8px; text-decoration:none; font-size:1.5rem; z-index:10;
         background: #16161d; color:#fff8e7; border-radius: 4px; border-color: #fff8e7; border:solid; border-width:1px; }
   .backbutton:hover {cursor:pointer; background: #fff8e7; color:#16161d; transition:0.3s} 
   /* make larger on mobile */
   /* Mobile */
   @media (max-width: 768px) {
   body {overflow-x: hidden; }
   ul {left: 15px; right: 15px; gap: 0.75rem; flex-wrap: wrap; }
   li { font-size: 1.4rem; padding: 10px 18px; min-height: 48px; }

   .backbutton { font-size: 2.2rem; padding: 8px 16px; top: 12px; left: 12px; }
   p { width: 90%; font-size: 2rem; line-height: 1.4; text-align: center; }
}

</style>
      
</head>
<body>
<div id="stars"></div>
<canvas id="crackCanvas"></canvas>
<p>click anywhere</p>

<a class="backbutton" href="/index.html">&lt;</a>
<ul class="top-buttons">
   <li class="colorbutton">color</li>
   <li class="resetbutton">reset</li>
</ul>

<script>
const starsEl = document.getElementById('stars');
for (let i = 0; i < 300; i++) {
  const s = document.createElement('span');
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%'; // spread across the doubled height
  starsEl.appendChild(s);
}
</script>

<script>
const canvas = document.getElementById("crackCanvas");
const ctx = canvas.getContext("2d");

document.addEventListener("click", (e) => { // hide things when clicked
   const p = document.querySelector('p');
   const stars = document.querySelector('#stars');
   if (p) {
      p.style.display = 'none';
      stars.style.display = 'none';
   }
});

const colorButton = document.querySelector('.colorbutton');
let useRandomColor = false;
const resetButton = document.querySelector('.resetbutton');

resetButton.addEventListener('click', (e) => {
      e.stopPropagation();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
});
colorButton.addEventListener('click', (e) => {
   e.stopPropagation();
   useRandomColor = !useRandomColor;
   if (useRandomColor){
      colorButton.textContent = 'uncolor';
   } else {
      colorButton.textContent = 'color';
   }
});

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

canvas.addEventListener('click', e => {
   const x = e.clientX;
   const y = e.clientY;
   createCrack(x, y);
})

function createCrack(x, y) {
   const crackLength = Math.max(canvas.width, canvas.height);
   ctx.lineWidth = 2;

   for(let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const endx = x + crackLength * Math.cos(angle);
      const endy = y + crackLength * Math.sin(angle);

      if (!useRandomColor) {
         ctx.strokeStyle = '#FFF8E7';
      } else {
         const hue = Math.floor(Math.random() * 360);
         const saturation = 80;
         const lightness = 70;
         ctx.strokeStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
      }

      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(endx,endy);
      ctx.stroke();
   }
}
</script>

</body>
</html>
