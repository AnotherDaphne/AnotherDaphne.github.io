<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sand</title>
<style>
  body { background: #16161d; font-family: sans-serif; color: #6b6a68; user-select: none; overflow: hidden; }
  canvas { display: block; cursor: pointer; border-bottom: 2px solid #6b6a68; }
  #text { font-size: 1rem; margin: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

  .resetbutton { position: fixed; top: 7px; left: 60px; background: #16161d; color: #fff8e7;
    border: solid 1px #fff8e7; border-radius: 4px; padding: 4px 12px; }
  .resetbutton:hover { cursor: pointer; background: #fff8e7; color: #16161d; transition: 0.3s; }

  .backbutton { position: absolute; top: 20px; left: 20px; padding: 2px 8px; text-decoration: none; font-size: 1.5rem;
    background: #16161d; color: #fff8e7; border-radius: 4px; border: solid 1px #fff8e7; }
  .backbutton:hover { cursor: pointer; background: #fff8e7; color: #16161d; transition: 0.3s; }
</style>
</head>
<body>
  <a class="backbutton" href="/index.html">&lt;</a>
  <p class="resetbutton">clear</p>

  <canvas id="sandCanvas"></canvas>
  <div id="text">hold mouse to pour sand, right click to erase</div>

<script>
const canvas = document.getElementById('sandCanvas');
const ctx = canvas.getContext('2d');

const CELL = 4;
const COLS = Math.floor(window.innerWidth * 0.995 / CELL);
const ROWS = Math.floor(window.innerHeight * 0.95 / CELL);

canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

// Grid stores 0 (empty) or a colour string (occupied)
const grid = Array.from({ length: ROWS }, () => new Array(COLS).fill(0));

const COLOURS = ['#c2955a', '#d4a96a', '#b8864e', '#e0b87a', '#a87840'];
const randomColour = () => COLOURS[Math.floor(Math.random() * COLOURS.length)];

document.querySelector('.resetbutton').addEventListener('click', e => {
  e.stopPropagation();
  grid.forEach(row => row.fill(0));
  draw();
});

let mouseDown = false;
let erasing = false;
let mouseX = 0, mouseY = 0;
const BRUSH = 3;

canvas.addEventListener('mousedown', e => { mouseDown = true; erasing = e.button === 2; });
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('mouseleave', () => mouseDown = false);
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = Math.floor((e.clientX - r.left) / CELL);
  mouseY = Math.floor((e.clientY - r.top) / CELL);
});

function spawnSand() {
  for (let dy = -BRUSH; dy <= BRUSH; dy++) {
    for (let dx = -BRUSH; dx <= BRUSH; dx++) {
      if (dx * dx + dy * dy > BRUSH * BRUSH) continue;
      const cx = mouseX + dx, cy = mouseY + dy;
      if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS) continue;

      if (erasing) {
        grid[cy][cx] = 0;
      } else if (!grid[cy][cx] && Math.random() < 0.4) {
        grid[cy][cx] = randomColour();
      }
    }
  }
}

// Bottom-to-top so falling grains don't move twice.
// Alternate left-to-right / right-to-left each row to avoid directional bias
// (much simpler than shuffling the whole column order).
function updateSand() {
  for (let row = ROWS - 2; row >= 0; row--) {
    const leftToRight = row % 2 === 0;
    for (let i = 0; i < COLS; i++) {
      const col = leftToRight ? i : COLS - 1 - i;
      if (!grid[row][col]) continue;

      const below = grid[row + 1][col];
      const belowLeft = col > 0 ? grid[row + 1][col - 1] : 1;
      const belowRight = col < COLS - 1 ? grid[row + 1][col + 1] : 1;

      if (!below) {
        grid[row + 1][col] = grid[row][col];
        grid[row][col] = 0;
      } else if (!belowLeft && !belowRight) {
        const dir = Math.random() < 0.5 ? -1 : 1;
        grid[row + 1][col + dir] = grid[row][col];
        grid[row][col] = 0;
      } else if (!belowLeft) {
        grid[row + 1][col - 1] = grid[row][col];
        grid[row][col] = 0;
      } else if (!belowRight) {
        grid[row + 1][col + 1] = grid[row][col];
        grid[row][col] = 0;
      }
    }
  }
}

function draw() {
  ctx.fillStyle = '#16161d';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      if (!grid[row][col]) continue;
      ctx.fillStyle = grid[row][col];
      ctx.fillRect(col * CELL, row * CELL, CELL, CELL);
    }
  }
}

let frameCount = 0;
const SPEED = 1.5; // higher number slower fall (skips frames)

function loop() {
  if (mouseDown) spawnSand();

  frameCount++;
  if (frameCount >= SPEED) {
    updateSand();
    frameCount = 0;
  }

  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
