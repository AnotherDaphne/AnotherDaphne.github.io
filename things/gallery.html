<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>
<script src="/script.js" defer></script>
<style>
#confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
   pointer-events: none; overflow: hidden; z-index: 999; }
#confetti span { position: absolute; top: -10px; width: 8px; height: 8px; 
   animation: fallConfetti linear forwards; }
@keyframes fallConfetti { to { transform: translateY(110vh) rotate(360deg); } }
</style>
<style>
body { background:#16161d; color:#fff8e7; font-family: sans-serif; padding: 20px; margin: 1rem 3rem;}
#gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
#gallery img { width: 100%; border-radius: 6px; border: 1px solid #fff8e7; cursor: pointer; }
.empty { opacity: 0.6; }

#lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
   background: #16161d; flex-direction: column; align-items: center;
   justify-content: center; cursor: pointer; z-index: 100; }
#lightbox img { max-width: 85%; max-height: 85%; border-radius: 6px; border: 1px solid #fff8e7; }
#lightbox-caption { margin-top: 12px; color: #fff8e7; font-size: 1rem; }

.backbutton { position:absolute; top: 20px; left: 20px; padding:2px 8px; text-decoration:none; font-size:1.5rem;
    background: #16161d; color:#fff8e7; border-radius: 4px; border-color: #fff8e7; border:solid; border-width:1px; }
.backbutton:hover {cursor:pointer; background: #fff8e7; color:#16161d; transition:0.3s} 

#stars { position: fixed; top: 0; left: 0; width: 100%; height: 200%; z-index: -1; overflow: hidden;
      animation: scrollStars 60s linear infinite; }
   #stars span { position: absolute; width: 2px; height: 2px; background: #fff8e7; border-radius: 50%; }
   @keyframes scrollStars {
      from { transform: translateY(-50%); }
      to   { transform: translateY(0); }
   }
</style>
</head>

<body>
<div id="stars"></div>
<a class="backbutton" href="/index.html">&lt;</a>

<script>
const starsEl = document.getElementById('stars');
for (let i = 0; i < 300; i++) {
  const s = document.createElement('span');
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%'; // spread across the doubled height
  starsEl.appendChild(s);
}
</script>

<div id="gallery"></div>

<div id="lightbox">
   <img id="lightbox-img" src="">
   <div id="lightbox-caption"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
   const firebaseConfig = {
      apiKey: "AIzaSyBkUk3ZewNRWdvEtA0dDz6Np_DAio17m4g",
      authDomain: "website-4a137.firebaseapp.com",
      projectId: "website-4a137",
      storageBucket: "website-4a137.firebasestorage.app",
      messagingSenderId: "67261630579",
      appId: "1:67261630579:web:b4d051795cfc43f1544206"
   };
   firebase.initializeApp(firebaseConfig);
   const db = firebase.database();
   const drawingsRef = db.ref('drawings');
   const galleryEl = document.getElementById('gallery');

   function formatTime(ts) {
   const d = new Date(Number(ts));
   return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) +
          ' ' + d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
   }

   drawingsRef.on('value', snapshot => {
      const data = snapshot.val() || {};
      const drawings = Object.values(data).sort((a, b) => b.timestamp - a.timestamp);

      if (drawings.length === 0) {
         galleryEl.innerHTML = '<div class="empty">No drawings yet</div>';
         return;
      }

      galleryEl.innerHTML = drawings.map(d =>
         `<img src="${d.image}" data-timestamp="${d.timestamp}">`
      ).join('');
   });

   // Lightbox
   const lightbox = document.getElementById('lightbox');
   const lightboxImg = document.getElementById('lightbox-img');
   const lightboxCaption = document.getElementById('lightbox-caption');

   galleryEl.addEventListener('click', (e) => {
      if (e.target.tagName === 'IMG') {
         lightboxImg.src = e.target.src;
         lightboxCaption.textContent = 'saved ' + formatTime(e.target.dataset.timestamp);
         lightbox.style.display = 'flex';
      }
   });

   lightbox.addEventListener('click', () => {
      lightbox.style.display = 'none';
   });
</script>

</body>
</html>
