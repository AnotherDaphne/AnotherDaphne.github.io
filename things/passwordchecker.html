<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Strength Checker</title>
    <style>
        body {margin-top: 8%; height: 100%; overflow: hidden; background: #16161d; color: #fff8E7; font-family: Arial, sans-serif; }
        ul {list-style:none; display: flex; justify-content: center; align-items: center;}
        small {color:#6b6a68 }
        input {background: #16161d; color: #fff8E7; border: 2px solid #fff8E7; padding: 0.5em; font-size: 1em; border-radius: 4px;}
    </style>
</head>
<body>

    <li>
        <ul>
            <h3>Type your password to see how strong it is</h3>
        </ul>
        <ul>
            <small>nothing is saved</small>
        </ul>
        <ul>
            <p>input password below: </p>
        </ul>
        <ul>
            <input type="text" id="password" autocomplete="off" />
        </ul>
        <ul>
            <p id="output"></p>
        </ul>
    </li>

<script>
    function updateOutput() {
        var password = document.getElementById("password").value;

        // calculate size of character pool
        var pool_size = 0
        if (/[a-z]/.test(password)) {
            pool_size += 26
        }
        if (/[A-Z]/.test(password)) {
            pool_size += 26
        }
        if (/[0-9]/.test(password)) {
            pool_size += 10
        }
        if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
            pool_size += 32
        }

        //calculate total combination (pool_size^password_length)
        var total_combinations = Math.pow(pool_size, password.length);

        // assume modern gpu can 10^10 guesses per second (10 billion)
        var guesses_per_second = 10000000000;

        seconds_to_crack = total_combinations / guesses_per_second;

        // convert seconds to readable format
        if (seconds_to_crack < 60) {
            var time_to_crack = seconds_to_crack.toFixed(2) + " seconds";
        } else if (seconds_to_crack < 3600) {
            var time_to_crack = (seconds_to_crack / 60).toFixed(2) + " minutes";
        } else if (seconds_to_crack < 86400) {
            var time_to_crack = (seconds_to_crack / 3600).toFixed(2) + " hours";
        } else if (seconds_to_crack < 31536000) {
            var time_to_crack = (seconds_to_crack / 86400).toFixed(2) + " days";
        } else {
            var time_to_crack = (seconds_to_crack / 31536000).toFixed(2) + " years";
        }

        var to_print = "Estimated time to crack: " + time_to_crack;

        if (password.length === 0) {
            to_print = "";
        }

            document.getElementById("output").textContent = to_print;
    }

    document.getElementById("password").addEventListener("input", updateOutput);
    updateOutput();

</script>

</body>
</html>
