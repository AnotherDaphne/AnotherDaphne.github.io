<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Strength Checker</title>
    <style>
        body {margin-top: 8%; height: 100%; overflow: hidden; background: #16161d; color: #fff8E7; font-family: Arial, sans-serif; }
        ul {list-style:none; display: flex; justify-content: center; align-items: center;}
        small {color:#6b6a68 }
        input {background: #16161d; color: #fff8E7; border: 2px solid #fff8E7; padding: 0.5em; font-size: 1em; border-radius: 4px;}
    </style>
</head>
<body>

    <li>
        <ul>
            <h3>Type your password to see how strong it is</h3>
        </ul>
        <ul>
            <small>nothing is saved</small>
        </ul>
        <ul>
            <p>input password below: </p>
        </ul>
        <ul>
            <input type="password" id="password" autocomplete="off" />
        </ul>
        <ul>
            <p id="output"></p>
        </ul>
    </li>

<script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>

<script>
function updateOutput() {
    const password = document.getElementById("password").value;

    if (!password.length) {
        document.getElementById("output").textContent = "";
        return;
    }

    // Run zxcvbn analysis
    const result = zxcvbn(password);

    // zxcvbn provides several crack-time estimates
    const secondsToCrack = BigInt(Math.floor(result.crack_times_seconds.offline_slow_hashing_1e4_per_second));

    document.getElementById("output").textContent =
        "Estimated time to crack: " + formatDuration(secondsToCrack);
}

function formatDuration(secondsBigInt) {
    const sec = Number(secondsBigInt);

    const units = [
        ["years", 31536000],
        ["days", 86400],
        ["hours", 3600],
        ["minutes", 60],
        ["seconds", 1]
    ];

    for (const [label, size] of units) {
        if (sec >= size) {
            const value = sec / size;
            return `${value.toFixed(2)} ${label}`;
        }
    }

    return "0 seconds";
}

document
    .getElementById("password")
    .addEventListener("input", updateOutput);

updateOutput();
</script>


</body>
</html>
