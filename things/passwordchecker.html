<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        body {background: #16161d; color: #fff8e7; font-family: Arial, sans-serif; margin-top:8%;}
        small {color: #6b6a68}

        .text-div {display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 1.5rem;}
        input {background: #16161d; color: #fff8E7; border: 2px solid #fff8E7; padding: 0.5em; font-size: 1em; border-radius: 4px;}

        .backbutton { position:absolute; top: 20px; left: 20px; padding:2px 8px; text-decoration:none; font-size:1.5rem;
            background: #16161d; color:#fff8e7; border-radius: 2px; border-color: #fff8e7; border:solid; border-width:1px; }
        .backbutton:hover {cursor:pointer; background: #fff8e7; color:#16161d; transition:0.3s} 
        /* make larger on mobile */
        @media (max-width: 768px) {
          body {margin-top: 5%; padding: 0 1rem;}
          .backbutton {font-size: 3rem; padding: 4px 12px;}
          .text-div {width: min(100%, 360px); padding: 0 0.5rem; gap: 1rem;}
          h3 {font-size: 1.5rem; text-align: center; margin: 0;}
          p, small {font-size: 1rem;}
          input {width: 100%; font-size: 1rem; max-width: 100%;}
        }
    </style>
</head>

<body>
    <a class="backbutton" href="/index.html">&lt;</a>
    <div class="text-div">
        <h3>Type your password to see how strong it is</h3>
        <small>nothing is saved</small>
        <p>input password below:</p>
        <input type="password" id="password" autocomplete="off">
        <p id="output"></p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>

    <script>
        function updateOutput() {
            const password = document.getElementById("password").value;

            if (!password.length) {
                document.getElementById("output").textContent = "";
                return;
            }

            const result = zxcvbn(password);
            time_to_crack = result.crack_times_seconds.offline_slow_hashing_1e4_per_second;
            
            document.getElementById("output").textContent = "estimated duration: " + calcDuration(time_to_crack);
        }

        function calcDuration(number) {
            const units = [
            ["years", 31536000],
            ["days", 86400],
            ["hours", 3600],
            ["minutes", 60],
            ["seconds", 1]  ]; 
            
            for (const[name, size] of units) {
                if (number >= size) {
                    const value = number/size;
                    return String(value.toFixed(2)+name);
                }
            }
            return "0 seconds";
        }

        document
            .getElementById("password")
            .addEventListener("input", updateOutput);
        updateOutput();

    </script>
</body>
